kind = "web"
previewPath = "/"
title = "Traffic Peak"
version = "1.0.0"
id = "artifacts/traffic-peak"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22638

[services.development]
run = "pnpm --filter @workspace/traffic-peak run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/traffic-peak", "run", "build" ]
publicDir = "artifacts/traffic-peak/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22638"
BASE_PATH = "/"
