<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="180" height="180" rx="36" fill="#0f1217"/>

  <!-- Keyboard body -->
  <rect x="30" y="62" width="120" height="72" rx="12" stroke="#60a5fa" stroke-width="6" fill="none"/>

  <!-- Key row 1 — 5 keys -->
  <rect x="42"  y="76" width="18" height="14" rx="4" fill="#60a5fa" opacity="0.85"/>
  <rect x="66"  y="76" width="18" height="14" rx="4" fill="#60a5fa" opacity="0.85"/>
  <rect x="90"  y="76" width="18" height="14" rx="4" fill="#60a5fa" opacity="0.85"/>
  <rect x="114" y="76" width="18" height="14" rx="4" fill="#60a5fa" opacity="0.85"/>

  <!-- Key row 2 — 4 keys offset -->
  <rect x="42"  y="96" width="18" height="14" rx="4" fill="#60a5fa" opacity="0.55"/>
  <rect x="66"  y="96" width="18" height="14" rx="4" fill="#60a5fa" opacity="0.55"/>
  <rect x="90"  y="96" width="18" height="14" rx="4" fill="#60a5fa" opacity="0.55"/>
  <rect x="114" y="96" width="18" height="14" rx="4" fill="#60a5fa" opacity="0.55"/>

  <!-- Spacebar -->
  <rect x="54" y="116" width="72" height="10" rx="5" fill="#60a5fa" opacity="0.7"/>
</svg>
